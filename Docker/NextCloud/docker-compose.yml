services:
  db:
    image: mariadb:10.11
    container_name: nextcloud_db
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    env_file:
      - .env
    environment:
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - ./nc-data/db:/var/lib/mysql
    networks:
      - nextcloud_net

  redis:
    image: redis:alpine
    container_name: nextcloud_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_HOST_PASSWORD}
    volumes:
      - ./nc-data/redis:/data
    networks:
      - nextcloud_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextcloud_app
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:80"
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
      - REDIS_HOST=nextcloud_redis
    volumes:
      - ./nc-data/app:/var/www/html
      - ./nc-data/data:/var/www/html/data
    depends_on:
      - db
      - redis
    networks:
      - nextcloud_net

networks:
  nextcloud_net:
    driver: bridge
